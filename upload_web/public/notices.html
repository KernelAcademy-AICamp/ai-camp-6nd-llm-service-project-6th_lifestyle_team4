<!DOCTYPE html>
<html class="light" lang="ko">
<head>
<meta charset="utf-8" />
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport" />
<title>공지사항 — S&Q Admin</title>
<link rel="manifest" href="/manifest-admin.webmanifest" />
<meta name="theme-color" content="#3525cd" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="S&Q Admin" />
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
<link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Noto+Sans+KR:wght@100..900&family=JetBrains+Mono:wght@400;500&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
<style>
  body { font-family: 'Inter', 'Noto Sans KR', sans-serif; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
  /* 공지 본문 렌더(미리보기 + 목록) — PWA renderNoticeBodyHtml 와 동일 마크업 */
  .nb-p { margin: 0; }
  .nb-h { font-weight: 700; font-size: 15px; line-height: 1.5; margin: 14px 0 6px; color: #111c2d; }
  .nb-h:first-child { margin-top: 0; }
  .nb-ul { margin: 6px 0; padding-left: 18px; list-style: disc; }
  .nb-ul li { margin: 3px 0; }
  .nb-gap { height: 14px; }
  .nb-img { display: block; max-width: 100%; height: auto; border-radius: 8px; margin: 12px 0; border: 1px solid #c7c4d8; }
  .nb-body strong { font-weight: 700; color: #111c2d; }
</style>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          'surface-variant': '#d8e3fb', 'inverse-surface': '#263143', 'outline': '#777587',
          'surface': '#f9f9ff', 'primary-fixed-dim': '#c3c0ff', 'error': '#ba1a1a',
          'background': '#f9f9ff', 'surface-container-high': '#dee8ff', 'inverse-primary': '#c3c0ff',
          'on-surface-variant': '#464555', 'surface-container-low': '#f0f3ff',
          'outline-variant': '#c7c4d8', 'on-primary': '#ffffff', 'surface-container-lowest': '#ffffff',
          'surface-container': '#e7eeff', 'on-error-container': '#93000a',
          'on-primary-container': '#dad7ff', 'surface-bright': '#f9f9ff',
          'secondary': '#006591', 'primary-container': '#4f46e5', 'tertiary': '#684000',
          'primary': '#3525cd', 'primary-fixed': '#e2dfff',
          'on-background': '#111c2d', 'on-surface': '#111c2d',
          'error-container': '#ffdad6', 'secondary-container': '#39b8fd',
          'inverse-on-surface': '#ecf1ff',
        },
        borderRadius: { DEFAULT: '0.25rem', lg: '0.5rem', xl: '0.75rem', full: '9999px' },
      },
    },
  };
</script>
</head>
<body class="bg-surface text-on-background min-h-screen">

<aside class="fixed left-0 top-0 h-full w-[280px] bg-surface border-r border-outline-variant flex flex-col p-4 gap-2 z-50">
  <div class="mb-8 px-2">
    <h1 class="text-xl font-bold text-primary tracking-tight">Script &amp; Quote Intelligence</h1>
    <p class="text-sm text-on-surface-variant mt-1">스크립트 및 견적 관리</p>
  </div>
  <nav class="flex flex-col gap-1 flex-1">
    <a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-container-low rounded-lg transition-colors" href="/dashboard.html">
      <span class="material-symbols-outlined">dashboard</span>
      <span class="text-sm">대시보드</span>
    </a>
    <a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-container-low rounded-lg transition-colors" href="/library.html">
      <span class="material-symbols-outlined">inventory_2</span>
      <span class="text-sm">조회</span>
    </a>
    <a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-container-low rounded-lg transition-colors" href="/quiz.html">
      <span class="material-symbols-outlined">quiz</span>
      <span class="text-sm">명대사 맞추기</span>
    </a>
    <a class="flex items-center gap-3 px-4 py-3 bg-secondary-container/20 text-primary rounded-lg font-bold" href="/notices.html">
      <span class="material-symbols-outlined">campaign</span>
      <span class="text-sm">공지사항</span>
    </a>
    <a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-container-low rounded-lg transition-colors opacity-50 cursor-not-allowed" href="#" aria-disabled="true">
      <span class="material-symbols-outlined">history</span>
      <span class="text-sm">히스토리 (Coming soon)</span>
    </a>
  </nav>
  <div class="border-t border-outline-variant pt-4 flex flex-col gap-1">
    <button data-install-app data-install-always class="flex items-center gap-3 px-4 py-2 text-primary hover:bg-surface-container-low rounded-lg transition-colors text-left border border-primary/30">
      <span class="material-symbols-outlined">install_mobile</span>
      <span class="text-sm font-medium">관리자 앱 설치</span>
    </button>
    <button id="logout-btn" class="flex items-center gap-3 px-4 py-2 text-error hover:bg-surface-container-low rounded-lg transition-colors text-left">
      <span class="material-symbols-outlined">logout</span>
      <span class="text-sm font-medium">로그아웃</span>
    </button>
  </div>
</aside>

<header class="fixed top-0 left-[280px] w-[calc(100%-280px)] h-16 bg-surface-container-lowest border-b border-outline-variant flex justify-between items-center px-8 z-40">
  <h2 class="text-xl font-extrabold text-primary">공지사항 관리</h2>
  <div class="flex items-center gap-3">
    <span id="user-email" class="text-sm text-on-surface-variant"></span>
  </div>
</header>

<main class="ml-[280px] pt-16 min-h-screen pb-32">
  <div class="p-8 flex flex-col gap-6 max-w-4xl mx-auto">

    <!-- 비관리자 경고 -->
    <div id="not-admin-banner" class="hidden flex items-center gap-3 p-4 rounded-lg bg-error-container text-on-error-container">
      <span class="material-symbols-outlined">lock</span>
      <span class="text-sm font-medium">관리자 권한이 없는 계정입니다. 공지 작성·수정·삭제는 admin 계정만 가능합니다.</span>
    </div>

    <!-- 작성 / 수정 폼 -->
    <section class="bg-surface-container-lowest border border-outline-variant rounded-xl p-6 flex flex-col gap-4">
      <div class="flex items-center justify-between">
        <h3 id="form-title" class="text-lg font-bold text-on-background">새 공지 작성</h3>
        <button id="cancel-edit" class="hidden text-sm text-on-surface-variant hover:text-on-background underline">수정 취소</button>
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="f-tag" class="text-sm font-semibold text-on-surface-variant">유형</label>
        <select id="f-tag" class="rounded-lg border-outline-variant bg-surface-container-lowest text-sm text-on-background focus:border-primary focus:ring-primary">
          <option value="notice">일반 (NOTICE)</option>
          <option value="update">업데이트 (UPDATE)</option>
          <option value="event">이벤트 (EVENT)</option>
        </select>
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="f-title" class="text-sm font-semibold text-on-surface-variant">제목 <span class="text-on-surface-variant/60 font-normal">(최대 120자)</span></label>
        <input id="f-title" type="text" maxlength="120" placeholder="예) 사용성 개선 업데이트"
               class="rounded-lg border-outline-variant bg-surface-container-lowest text-sm text-on-background focus:border-primary focus:ring-primary" />
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="f-body" class="text-sm font-semibold text-on-surface-variant">본문 <span class="text-on-surface-variant/60 font-normal">(서식 지원 · 최대 4000자)</span></label>

        <!-- 서식 툴바 -->
        <div class="flex items-center gap-1.5 flex-wrap">
          <button type="button" id="md-bold" title="굵게 (**텍스트**)"
                  class="px-2.5 py-1.5 rounded-lg border border-outline-variant text-sm font-bold text-on-background hover:bg-surface-container-low transition-colors disabled:opacity-40 disabled:cursor-not-allowed">B</button>
          <button type="button" id="md-head" title="소제목 (## 제목)"
                  class="px-2.5 py-1.5 rounded-lg border border-outline-variant text-sm font-semibold text-on-background hover:bg-surface-container-low transition-colors disabled:opacity-40 disabled:cursor-not-allowed">소제목</button>
          <button type="button" id="md-list" title="목록 (- 항목)"
                  class="px-2.5 py-1.5 rounded-lg border border-outline-variant text-sm text-on-background hover:bg-surface-container-low transition-colors disabled:opacity-40 disabled:cursor-not-allowed">• 목록</button>
          <button type="button" id="md-image" title="이미지 업로드"
                  class="px-2.5 py-1.5 rounded-lg border border-primary/40 text-sm font-medium text-primary hover:bg-surface-container-low transition-colors flex items-center gap-1 disabled:opacity-40 disabled:cursor-not-allowed">
            <span class="material-symbols-outlined text-base">image</span>이미지
          </button>
          <span id="md-status" class="text-xs text-on-surface-variant"></span>
          <input type="file" id="md-file" accept="image/*" class="hidden" />
        </div>

        <textarea id="f-body" rows="8" maxlength="4000" placeholder="안녕하세요.&#10;&#10;## 첫 번째 소식&#10;- 항목 하나&#10;- **중요한** 항목 둘&#10;&#10;이미지는 위 ‘이미지’ 버튼으로 넣을 수 있어요."
                  class="rounded-lg border-outline-variant bg-surface-container-lowest text-sm text-on-background leading-relaxed focus:border-primary focus:ring-primary font-mono"></textarea>
        <p class="text-xs text-on-surface-variant/70 leading-relaxed">
          <b>**굵게**</b> · <b>## 소제목</b> · <b>- 목록</b> · 빈 줄로 문단 구분 · 이미지 버튼으로 사진 첨부
        </p>

        <!-- 실시간 미리보기 -->
        <div class="mt-2">
          <p class="text-xs font-semibold text-on-surface-variant mb-1">미리보기</p>
          <div id="body-preview" class="nb-body rounded-lg border border-outline-variant bg-surface-container-low p-4 text-sm text-on-background min-h-[64px] leading-relaxed"></div>
        </div>
      </div>

      <div class="flex items-center gap-6 flex-wrap">
        <label class="flex items-center gap-2 text-sm text-on-background cursor-pointer select-none">
          <input id="f-pinned" type="checkbox" class="rounded border-outline-variant text-primary focus:ring-primary" />
          상단 고정
        </label>
        <label class="flex items-center gap-2 text-sm text-on-background cursor-pointer select-none">
          <input id="f-published" type="checkbox" checked class="rounded border-outline-variant text-primary focus:ring-primary" />
          게시 (앱에 노출)
        </label>
      </div>

      <div class="flex items-center gap-3">
        <button id="save-btn" class="px-5 py-2.5 rounded-lg bg-primary text-on-primary text-sm font-bold hover:opacity-90 transition-opacity disabled:opacity-40 disabled:cursor-not-allowed">
          공지 등록
        </button>
        <p id="form-msg" class="hidden text-sm"></p>
      </div>
    </section>

    <!-- 목록 -->
    <section class="flex flex-col gap-3">
      <h3 class="text-lg font-bold text-on-background">등록된 공지</h3>
      <div id="notice-list" class="flex flex-col gap-3"></div>
      <p id="list-empty" class="hidden text-on-surface-variant text-sm py-10 text-center">아직 등록된 공지가 없습니다.</p>
      <p id="list-loading" class="text-on-surface-variant text-sm py-10 text-center">불러오는 중…</p>
    </section>

  </div>
</main>

<div id="toast" class="fixed left-1/2 bottom-8 -translate-x-1/2 bg-inverse-surface text-inverse-on-surface px-4 py-2.5 rounded-lg text-sm shadow-lg opacity-0 pointer-events-none transition-opacity z-50"></div>

<script type="module" src="/assets/notices.js"></script>
<script type="module" src="/assets/pwa.js"></script>
</body>
</html>
