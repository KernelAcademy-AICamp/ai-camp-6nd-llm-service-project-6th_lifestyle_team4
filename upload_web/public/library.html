<!DOCTYPE html>
<html class="light" lang="ko">
<head>
<meta charset="utf-8" />
<meta content="width=device-width, initial-scale=1.0" name="viewport" />
<title>Script & Quote Intelligence — 조회</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Noto+Sans+KR:wght@100..900&family=JetBrains+Mono:wght@400;500&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
<style>
  body { font-family: 'Inter', 'Noto Sans KR', sans-serif; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
  .custom-scrollbar::-webkit-scrollbar { width: 6px; }
  .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
  .custom-scrollbar::-webkit-scrollbar-thumb { background: #c7c4d8; border-radius: 10px; }
</style>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          'surface-variant': '#d8e3fb', 'inverse-surface': '#263143', 'outline': '#777587',
          'surface': '#f9f9ff', 'primary-fixed-dim': '#c3c0ff', 'error': '#ba1a1a',
          'background': '#f9f9ff', 'surface-container-high': '#dee8ff', 'inverse-primary': '#c3c0ff',
          'on-surface-variant': '#464555', 'surface-container-low': '#f0f3ff',
          'outline-variant': '#c7c4d8', 'on-primary': '#ffffff', 'surface-container-lowest': '#ffffff',
          'surface-container': '#e7eeff', 'on-error-container': '#93000a',
          'on-primary-container': '#dad7ff', 'surface-bright': '#f9f9ff',
          'secondary': '#006591', 'primary-container': '#4f46e5', 'tertiary': '#684000',
          'primary': '#3525cd', 'primary-fixed': '#e2dfff',
          'on-background': '#111c2d', 'on-surface': '#111c2d',
          'error-container': '#ffdad6', 'secondary-container': '#39b8fd',
          'inverse-on-surface': '#ecf1ff',
        },
        borderRadius: { DEFAULT: '0.25rem', lg: '0.5rem', xl: '0.75rem', full: '9999px' },
      },
    },
  };
</script>
</head>
<body class="bg-surface text-on-background min-h-screen">

<aside class="fixed left-0 top-0 h-full w-[280px] bg-surface border-r border-outline-variant flex flex-col p-4 gap-2 z-50">
  <div class="mb-8 px-2">
    <h1 class="text-xl font-bold text-primary tracking-tight">Script &amp; Quote Intelligence</h1>
    <p class="text-sm text-on-surface-variant mt-1">스크립트 및 견적 관리</p>
  </div>
  <nav class="flex flex-col gap-1 flex-1">
    <a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-container-low rounded-lg transition-colors" href="/dashboard.html">
      <span class="material-symbols-outlined">dashboard</span>
      <span class="text-sm">대시보드</span>
    </a>
    <a class="flex items-center gap-3 px-4 py-3 bg-secondary-container/20 text-primary rounded-lg font-bold" href="/library.html">
      <span class="material-symbols-outlined">inventory_2</span>
      <span class="text-sm">조회</span>
    </a>
    <a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-container-low rounded-lg transition-colors opacity-50 cursor-not-allowed" href="#" aria-disabled="true">
      <span class="material-symbols-outlined">history</span>
      <span class="text-sm">히스토리 (Coming soon)</span>
    </a>
  </nav>
  <div class="border-t border-outline-variant pt-4 flex flex-col gap-1">
    <button id="logout-btn" class="flex items-center gap-3 px-4 py-2 text-error hover:bg-surface-container-low rounded-lg transition-colors text-left">
      <span class="material-symbols-outlined">logout</span>
      <span class="text-sm font-medium">로그아웃</span>
    </button>
  </div>
</aside>

<header class="fixed top-0 left-[280px] w-[calc(100%-280px)] h-16 bg-surface-container-lowest border-b border-outline-variant flex justify-between items-center px-8 z-40">
  <h2 class="text-xl font-extrabold text-primary">저장된 카드 조회</h2>
  <div class="flex items-center gap-3">
    <span id="user-email" class="text-sm text-on-surface-variant"></span>
  </div>
</header>

<main class="ml-[280px] pt-16 min-h-screen pb-16">
  <div class="p-8 flex flex-col gap-6 max-w-7xl mx-auto">

    <section class="flex flex-col gap-4">
      <div class="flex items-center justify-between flex-wrap gap-3">
        <div>
          <h2 class="text-2xl font-bold text-on-surface flex items-center gap-2">
            <span class="material-symbols-outlined">inventory_2</span>
            저장된 카드
          </h2>
          <p class="text-sm text-on-surface-variant mt-1">DB에 저장된 모든 카드. 항상 조회 가능. 클릭으로 편집·삭제.</p>
        </div>
        <div class="flex items-center gap-2 flex-wrap">
          <select id="library-work-filter" class="px-3 py-2 rounded-lg border border-outline-variant bg-surface-container-lowest text-sm">
            <option value="">모든 작품</option>
          </select>
          <input id="library-search" type="search" placeholder="명대사 검색…" class="px-3 py-2 rounded-lg border border-outline-variant bg-surface-container-lowest text-sm w-48" />
          <button type="button" id="library-refresh" class="px-3 py-2 rounded-lg border border-outline-variant text-sm hover:bg-surface-container-low flex items-center gap-1">
            <span class="material-symbols-outlined text-base">refresh</span>
            새로고침
          </button>
        </div>
      </div>

      <p id="library-status" class="text-sm text-on-surface-variant">불러오는 중…</p>

      <div id="library-grid" class="grid grid-cols-1 xl:grid-cols-2 gap-6"></div>

      <p id="library-empty" class="hidden text-center text-on-surface-variant py-12">저장된 카드가 없습니다.</p>
    </section>

  </div>
</main>

<!-- Toast -->
<div id="toast" class="fixed bottom-8 right-8 hidden px-4 py-3 bg-inverse-surface text-inverse-on-surface rounded-lg shadow-xl z-50 text-sm"></div>

<!-- Library card template -->
<template id="library-card-template">
  <div class="card bg-surface-container-lowest border border-outline-variant rounded-xl p-6 flex flex-col gap-4 transition-all shadow-sm relative">
    <div class="flex justify-between items-start gap-2">
      <div class="flex flex-col gap-1 min-w-0">
        <span class="lib-work-title text-xs font-bold text-secondary truncate"></span>
        <span class="lib-tag text-xs font-medium text-primary bg-primary/5 px-2 py-1 rounded self-start"></span>
      </div>
      <div class="flex gap-1 shrink-0">
        <button type="button" class="lib-edit-btn p-1.5 rounded hover:bg-surface-container-low text-on-surface-variant transition-colors" title="편집">
          <span class="material-symbols-outlined text-base">edit</span>
        </button>
        <button type="button" class="lib-delete-btn p-1.5 rounded hover:bg-error/10 text-error transition-colors" title="삭제">
          <span class="material-symbols-outlined text-base">delete</span>
        </button>
      </div>
    </div>

    <p class="lib-quote text-xl font-semibold leading-relaxed text-on-surface"></p>

    <div class="mono bg-surface-container-low rounded-lg p-4 text-[13px] text-on-surface-variant leading-relaxed border border-outline-variant/30 lib-excerpt whitespace-pre-wrap max-h-60 overflow-y-auto custom-scrollbar"></div>

    <div class="flex flex-col gap-2">
      <p class="text-sm font-semibold text-on-surface-variant">상황 설명</p>
      <p class="lib-description text-sm text-on-surface"></p>
    </div>

    <div class="lib-keywords flex flex-wrap gap-2"></div>

    <div class="grid grid-cols-2 gap-4 py-2">
      <div class="flex flex-col gap-1">
        <div class="flex justify-between text-xs">
          <span>Temperature</span>
          <span class="lib-temp-num text-primary font-bold"></span>
        </div>
        <div class="lib-temp-bar flex gap-1"></div>
      </div>
      <div class="flex flex-col gap-1">
        <div class="flex justify-between text-xs">
          <span>Intensity</span>
          <span class="lib-intensity-num text-secondary font-bold"></span>
        </div>
        <div class="lib-intensity-bar flex gap-1"></div>
      </div>
    </div>

    <p class="lib-meta text-[11px] text-on-surface-variant border-t border-outline-variant/30 pt-2"></p>
  </div>
</template>

<!-- Library card EDIT mode template -->
<template id="library-edit-template">
  <div class="card bg-surface-container-lowest border-2 border-primary rounded-xl p-6 flex flex-col gap-3 shadow-md">
    <div class="flex justify-between items-center">
      <span class="text-xs font-bold text-primary uppercase tracking-wider">DB 카드 편집 중</span>
      <div class="flex gap-1">
        <button type="button" class="lib-cancel-edit-btn p-1.5 rounded hover:bg-surface-container-low text-on-surface-variant transition-colors" title="취소">
          <span class="material-symbols-outlined text-base">close</span>
        </button>
        <button type="button" class="lib-save-edit-btn p-1.5 rounded bg-primary text-on-primary hover:opacity-90 transition-opacity" title="저장">
          <span class="material-symbols-outlined text-base">check</span>
        </button>
      </div>
    </div>

    <div class="flex flex-col gap-1">
      <label class="text-xs font-semibold text-on-surface-variant">명대사</label>
      <textarea class="lib-edit-quote w-full p-2 rounded-lg border border-outline-variant bg-surface-container-lowest text-base leading-relaxed resize-y" rows="3"></textarea>
    </div>

    <div class="flex flex-col gap-1">
      <label class="text-xs font-semibold text-on-surface-variant">대본 발췌 (script_excerpt)</label>
      <textarea class="lib-edit-excerpt w-full p-2 rounded-lg border border-outline-variant bg-surface-container-low text-[13px] font-mono leading-relaxed resize-y" rows="8"></textarea>
    </div>

    <div class="flex flex-col gap-1">
      <label class="text-xs font-semibold text-on-surface-variant">상황 설명 (excerpt_description)</label>
      <textarea class="lib-edit-description w-full p-2 rounded-lg border border-outline-variant bg-surface-container-lowest text-sm resize-y" rows="3"></textarea>
    </div>

    <div class="flex flex-col gap-1">
      <label class="text-xs font-semibold text-on-surface-variant">키워드 (쉼표로 구분, 최대 3개)</label>
      <input type="text" class="lib-edit-keywords w-full p-2 rounded-lg border border-outline-variant bg-surface-container-lowest text-sm" placeholder="키워드1, 키워드2, 키워드3" />
    </div>

    <div class="grid grid-cols-2 gap-3">
      <div class="flex flex-col gap-1">
        <label class="text-xs font-semibold text-on-surface-variant">Temperature (1~5)</label>
        <input type="number" min="1" max="5" class="lib-edit-temperature w-full p-2 rounded-lg border border-outline-variant bg-surface-container-lowest text-sm" />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-xs font-semibold text-on-surface-variant">Intensity (1~5)</label>
        <input type="number" min="1" max="5" class="lib-edit-intensity w-full p-2 rounded-lg border border-outline-variant bg-surface-container-lowest text-sm" />
      </div>
    </div>
  </div>
</template>

<script type="module" src="/assets/library.js"></script>
</body>
</html>
