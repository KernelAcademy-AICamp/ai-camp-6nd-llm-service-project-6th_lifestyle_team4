<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport" />
<title>Archive Preview v4 — Daily Script</title>
<meta name="theme-color" content="#FAF8F2" />
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@400;500;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
<style>
  :root {
    --espresso: #0E0C0A;
    --walnut:   #6B5D4F;
    --paper:    #FAF8F2;
    --latte:    #E8E1D3;
    --sand:     #C9B89A;
    --cta:      #D85A30;
    --gold:     #C9A24B;
    --gold-bright: #E6CC82;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', system-ui, sans-serif;
    background: var(--paper);
    color: var(--espresso);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 80px;
  }
  .serif { font-family: 'Nanum Myeongjo', Georgia, serif; }
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 20;
    vertical-align: middle;
  }
  .preview-banner {
    background: #fff7ed; border-bottom: 1px solid #fde68a;
    color: #92400e; text-align: center; padding: 10px;
    font-size: 12px; letter-spacing: 0.1em;
    text-transform: uppercase; font-weight: 600;
  }
  .top-bar {
    background: var(--paper); height: 64px; padding: 0 20px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 0.5px solid var(--latte);
    position: sticky; top: 0; z-index: 10;
  }
  main { padding: 0 20px; }
  .display-md { font-family: 'Nanum Myeongjo', Georgia, serif; font-size: 32px; line-height: 42px; }
  .label-sm { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--walnut); }

  /* Chips & search */
  .archive-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 24px; margin-bottom: 14px; }
  .a-chip {
    padding: 6px 14px;
    border: 0.5px solid var(--walnut); background: var(--paper); color: var(--walnut);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer;
  }
  .a-chip.active { background: var(--espresso); color: var(--paper); border-color: var(--espresso); }
  .archive-search { margin-top: 4px; position: relative; }
  .archive-search input {
    width: 100%; padding: 12px 14px 12px 42px;
    background: var(--paper); border: 0.5px solid var(--walnut);
    color: var(--espresso); font-size: 14px; border-radius: 0; outline: none;
  }
  .archive-search input::placeholder { color: var(--sand); }
  .archive-search .material-symbols-outlined {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--walnut); font-size: 18px !important; pointer-events: none;
  }
  .genre-section { margin-top: 28px; }
  .genre-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; padding: 0 4px; }
  .genre-name { font-family: 'Nanum Myeongjo', serif; font-size: 18px; color: var(--espresso); letter-spacing: 0.5px; }
  .genre-count { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--walnut); }

  /* ===== Bookshelf as a wooden frame ===== */
  .bookshelf {
    --frame: #4A2A18;
    --frame-light: #6E4A2E;
    --back: #2E1D10;
    position: relative;
    padding: 8px 0 0;          /* top cap visible */
    border-radius: 4px;
    /* outer wood frame (left/right/top) */
    border: 10px solid var(--frame);
    border-top-width: 14px;
    /* back wall — dark recessed */
    background:
      linear-gradient(180deg, rgba(0,0,0,0.35), rgba(0,0,0,0.45) 30%, rgba(0,0,0,0.55) 60%, rgba(0,0,0,0.6)),
      linear-gradient(180deg, var(--back) 0%, #1B0E06 100%);
    box-shadow:
      /* outer shadow under the whole bookshelf */
      0 6px 14px rgba(0,0,0,0.35),
      /* inner shadow — recessed back wall (deep) */
      inset 0 8px 20px rgba(0,0,0,0.6),
      /* top frame highlight */
      inset 0 2px 0 rgba(255,235,190,0.18);
  }
  /* top cap wood grain */
  .bookshelf::before {
    content: '';
    position: absolute;
    top: -14px; left: -10px; right: -10px;
    height: 14px;
    background:
      repeating-linear-gradient(90deg, rgba(0,0,0,0.08) 0 6px, transparent 6px 14px),
      linear-gradient(180deg, var(--frame-light), var(--frame));
    border-bottom: 1px solid rgba(0,0,0,0.4);
  }
  .shelf-row {
    display: flex; gap: 2px;
    padding: 0 6px;
    align-items: flex-end;
    min-height: 220px;
    flex-wrap: nowrap;
    overflow-x: auto; overflow-y: hidden;
    position: relative;
    /* shelf board — thick horizontal wood plank under the books */
    border-bottom: 16px solid var(--frame);
    box-shadow:
      /* top highlight on shelf board (light hits the front edge) */
      0 1px 0 rgba(255,235,190,0.20) inset,
      /* shadow under the shelf board (depth) */
      0 6px 8px rgba(0,0,0,0.5),
      /* darken inside the shelf compartment */
      inset 0 -2px 4px rgba(0,0,0,0.4);
  }
  .shelf-row::-webkit-scrollbar { display: none; }
  /* horizontal wood grain on the shelf board */
  .shelf-row::after {
    content: '';
    position: absolute;
    left: 0; right: 0; bottom: -16px; height: 16px;
    pointer-events: none;
    background:
      repeating-linear-gradient(90deg, rgba(0,0,0,0.10) 0 8px, transparent 8px 22px),
      linear-gradient(180deg, var(--frame-light) 0%, var(--frame) 50%, #2E180B 100%);
    border-top: 0.5px solid rgba(255,235,190,0.18);
  }

  /* Genre-specific frame colors */
  .bookshelf.g-movie   { --frame:#4A2A18; --frame-light:#6E4A2E; --back:#2E1D10; }
  .bookshelf.g-drama   { --frame:#6B4A2A; --frame-light:#947040; --back:#3F2A14; }
  .bookshelf.g-musical { --frame:#5A2818; --frame-light:#7E3A28; --back:#321008; }
  .bookshelf.g-opera   { --frame:#26180E; --frame-light:#3F2A1A; --back:#140A05; }
  .bookshelf.g-play    { --frame:#3F2818; --frame-light:#5C3A24; --back:#241408; }

  /* ===== Spine — book on shelf ===== */
  .spine {
    flex-shrink: 0;
    border-radius: 2px 2px 0 0;
    display: flex;
    cursor: pointer;
    position: relative;
    border: none;
    color: var(--gold-bright);
    text-shadow: 0 1px 2px rgba(0,0,0,0.7);
    transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    box-shadow:
      inset 4px 0 6px rgba(0,0,0,0.45),
      inset -3px 0 4px rgba(255,255,255,0.10),
      inset 0 3px 4px rgba(255,255,255,0.10),
      inset 0 -4px 6px rgba(0,0,0,0.5),
      2px 0 4px rgba(0,0,0,0.55);
    background-image:
      radial-gradient(ellipse at 30% 25%, rgba(255,255,255,0.10), transparent 60%),
      radial-gradient(ellipse at 70% 80%, rgba(0,0,0,0.25), transparent 55%);
    overflow: hidden;
  }
  .spine:hover, .spine.active {
    transform: translateY(-22px);
    filter: brightness(1.08);
    box-shadow:
      inset 4px 0 6px rgba(0,0,0,0.45),
      inset -3px 0 4px rgba(255,255,255,0.14),
      inset 0 3px 4px rgba(255,255,255,0.12),
      inset 0 -4px 6px rgba(0,0,0,0.5),
      0 14px 22px rgba(0,0,0,0.60),
      0 0 0 1px var(--cta);
    z-index: 2;
  }
  /* gold band — top */
  .spine::before {
    content: '';
    position: absolute;
    left: 0; right: 0; top: 10px; height: 12px;
    background:
      linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.5) 30%, var(--gold) 50%, rgba(0,0,0,0.5) 70%, transparent 100%);
    border-top: 0.5px solid rgba(255, 230, 180, 0.4);
    border-bottom: 0.5px solid rgba(0, 0, 0, 0.7);
    z-index: 1;
  }
  /* gold band — bottom */
  .spine::after {
    content: '';
    position: absolute;
    left: 0; right: 0; bottom: 12px; height: 12px;
    background:
      linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.5) 30%, var(--gold) 50%, rgba(0,0,0,0.5) 70%, transparent 100%);
    border-top: 0.5px solid rgba(255, 230, 180, 0.4);
    border-bottom: 0.5px solid rgba(0, 0, 0, 0.7);
    z-index: 1;
  }
  .spine-inner {
    position: relative; z-index: 2;
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: space-between;
    padding: 32px 3px 32px;
    width: 100%; height: 100%;
  }
  .spine-count {
    font-family: 'Nanum Myeongjo', serif; font-size: 11px;
    color: var(--gold-bright);
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    flex-shrink: 0;
  }
  .spine-title {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    font-family: 'Nanum Myeongjo', 'Noto Serif KR', Georgia, serif;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--gold-bright);
    white-space: nowrap;
    /* 절대 잘리지 않게 — ellipsis 제거, overflow visible 허용 */
    overflow: visible;
    text-align: center;
    flex: 1 1 auto;
    display: flex; align-items: center; justify-content: center;
  }
  .spine-genre {
    font-size: 8px; color: var(--gold);
    text-transform: uppercase; letter-spacing: 0.2em; font-weight: 700;
    flex-shrink: 0;
  }

  /* ===== Book modal (same as v2) ===== */
  .book-modal {
    position: fixed; inset: 0;
    background: rgba(14,12,10,0.65);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
    perspective: 1500px;
  }
  .book-modal.open { opacity: 1; pointer-events: auto; }
  .book {
    background: var(--paper);
    width: 100%; max-width: 480px; max-height: 85vh;
    overflow-y: auto;
    padding: 36px 28px 28px 40px;
    border-left: 8px solid #5A2A24;
    border-right: 0.5px solid var(--latte);
    box-shadow:
      -10px 0 18px rgba(0,0,0,0.25),
      inset 10px 0 12px rgba(0,0,0,0.05),
      inset -2px 0 0 var(--latte);
    transform: rotateY(-100deg) scale(0.6);
    transform-origin: left center;
    transition: transform 0.55s cubic-bezier(0.34, 1.2, 0.64, 1);
    position: relative;
  }
  .book-modal.open .book { transform: rotateY(0deg) scale(1); }
  .book::before {
    content: ''; position: absolute; inset: 36px 28px 28px 40px;
    background: repeating-linear-gradient(180deg,
      transparent 0px, transparent 28px,
      rgba(107,93,79,0.08) 28px, rgba(107,93,79,0.08) 29px);
    pointer-events: none; z-index: 0;
  }
  .book > * { position: relative; z-index: 1; }
  .book-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 6px; }
  .book-eyebrow { font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--walnut); margin-bottom: 6px; }
  .book-title { font-family: 'Nanum Myeongjo', Georgia, serif; font-size: 28px; line-height: 36px; color: var(--espresso); }
  .book-close {
    background: transparent; border: 0.5px solid var(--walnut);
    width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
  }
  .book-meta { margin-top: 8px; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--walnut); }
  .book-divider { margin: 20px 0 12px; height: 0.5px; background: var(--sand); }
  #book-list { counter-reset: quote-counter; }
  .book-quote-item {
    background: #FFFDF7;
    border: 0.5px solid var(--latte); border-left: 3px solid var(--sand);
    padding: 22px 16px 16px 18px; margin-bottom: 12px;
    cursor: pointer; position: relative;
    box-shadow: 0 1px 2px rgba(14,12,10,0.04);
  }
  .book-quote-item::before {
    content: '#' counter(quote-counter, decimal-leading-zero);
    counter-increment: quote-counter;
    position: absolute; top: 8px; right: 12px;
    font-size: 9px; letter-spacing: 0.25em; color: var(--sand); font-weight: 700;
  }
  .book-quote-text { font-family: 'Nanum Myeongjo', Georgia, serif; font-size: 16px; line-height: 26px; color: var(--espresso); word-break: keep-all; white-space: pre-line; }
  .book-quote-meta {
    font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--walnut);
    margin-top: 10px; padding-top: 8px; border-top: 0.5px dashed var(--latte);
  }
  .book-pagefoot { text-align: center; margin-top: 24px; font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--sand); }

  /* Preview action bar */
  .preview-actions {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: var(--paper); border-top: 0.5px solid var(--latte);
    padding: 14px 20px; display: flex; gap: 10px; z-index: 50;
  }
  .preview-actions button {
    flex: 1; padding: 14px; border: none;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px; font-weight: 500; letter-spacing: 0.1em; cursor: pointer;
  }
  .preview-actions .approve { background: var(--espresso); color: var(--paper); }
  .preview-actions .reject { background: transparent; color: var(--espresso); border: 0.5px solid var(--espresso); }
</style>
</head>
<body>

<div class="preview-banner">Archive Preview v4 — 진짜 책꽂이 프레임</div>

<header class="top-bar">
  <span class="serif" style="font-size:22px;">Daily Script</span>
  <span class="label-sm">PREVIEW</span>
</header>

<main>
  <div style="height:24px;"></div>
  <h1 class="display-md">수집한 대본</h1>
  <p class="label-sm" style="margin-top:6px;">소장 7권 · 명대사 21편</p>

  <div class="archive-chips">
    <button class="a-chip active">All · 7</button>
    <button class="a-chip">영화 · 3</button>
    <button class="a-chip">오페라 · 2</button>
    <button class="a-chip">뮤지컬 · 1</button>
    <button class="a-chip">연극 · 1</button>
  </div>

  <div class="archive-search">
    <span class="material-symbols-outlined">search</span>
    <input type="search" placeholder="작품 제목으로 검색" />
  </div>

  <div id="bookshelves"></div>
</main>

<div id="book-modal" class="book-modal" role="dialog" aria-modal="true">
  <div class="book">
    <div class="book-header">
      <div style="flex:1;min-width:0;">
        <p id="b-eyebrow" class="book-eyebrow">Collected · Volume #03</p>
        <h2 id="b-title" class="book-title">Title</h2>
        <p id="b-meta" class="book-meta">GENRE · AUTHOR · YEAR</p>
      </div>
      <button id="b-close" class="book-close"><span class="material-symbols-outlined" style="font-size:18px;color:#2C2620;">close</span></button>
    </div>
    <div class="book-divider"></div>
    <div id="b-list"></div>
    <p class="book-pagefoot">— Daily Script · Limited Edition —</p>
  </div>
</div>

<div class="preview-actions">
  <button class="reject" onclick="alert('어떤 부분이 별로인지 채팅에 적어주세요.')">다른 디자인</button>
  <button class="approve" onclick="alert('OK 라고 채팅에 답변해주세요. 그러면 /m/ Archive에 적용합니다.')">이 디자인 OK</button>
</div>

<script>
  const works = [
    { key: 'titanic', title: 'TITANIC', genre: 'movie', genreLabel: '영화', author: 'James Cameron', year: '1997', color: '#0E0C0A', quotes: [{q:"I'm the king of the world!",d:'Jack at the bow'},{q:'You jump, I jump.',d:'Rose to Jack'},{q:'Never let go.',d:'On the door'},{q:'Promise me you will survive.',d:"Jack's wish"},{q:"It's been 84 years…",d:'Old Rose'}] },
    { key: 'pirang', title: '파이란', genre: 'movie', genreLabel: '영화', author: '송해성', year: '2001', color: '#2F3A30', quotes: [{q:'당신은… 나에게는 너무 좋은 사람이었어요.',d:'파이란의 편지'},{q:'강재 씨, 정말 미안해요.',d:'편지 마무리'},{q:'바다는 너무나 푸르고…',d:'엔딩 내레이션'},{q:'왜 죽어야 했는지 알 것 같아.',d:'강재의 깨달음'}] },
    { key: 'ahjeossi', title: '아저씨', genre: 'movie', genreLabel: '영화', author: '이정범', year: '2010', color: '#293541', quotes: [{q:'너희들은 내일을 보고 살지만, 나는 오늘만 산다.',d:'차태식 명대사'},{q:'그러니까 오늘만 사는 사람한테 까불지 마라.',d:'협박 장면'}] },
    { key: 'carmen', title: 'CARMEN', genre: 'opera', genreLabel: '오페라', author: 'Bizet', year: '1875', color: '#5A2A24', quotes: [{q:'사랑은 길들이지 못한 새',d:'하바네라 도입부'},{q:'사랑은 어디로 갈지 모르는 집시의 아이',d:'하바네라'},{q:'내가 너를 사랑한다면 조심해',d:'카르멘의 경고'}] },
    { key: 'rigoletto', title: 'RIGOLETTO', genre: 'opera', genreLabel: '오페라', author: 'Verdi', year: '1851', color: '#40303B', quotes: [{q:'여자의 마음은 갈대와 같이',d:'만토바 공작 아리아'}] },
    { key: 'billy', title: 'BILLY ELLIOT', genre: 'musical', genreLabel: '뮤지컬', author: 'Elton John', year: '2005', color: '#6A4A30', quotes: [{q:'Electricity, sparks inside of me',d:'Electricity 솔로'},{q:"I can't really explain it…",d:'오디션'}] },
    { key: 'sontuk', title: '바람의 노래', genre: 'play', genreLabel: '연극', author: '연극', year: '—', color: '#3A463F', quotes: [{q:'바람은 어디서 와서 어디로 가는가',d:'도입부 독백'},{q:'끝은 또 다른 시작',d:'엔딩'}] },
  ];

  const GENRE_ORDER = ['movie','drama','musical','opera','play'];
  const GENRE_LABEL = { movie:'영화', drama:'드라마', musical:'뮤지컬', opera:'오페라', play:'연극' };

  // 책 사이즈 동적 — 제목 길이에 따라 높이·폭·폰트 크기 조정
  function bookDims(w) {
    const titleLen = w.title.length;
    // 폰트: 짧은 제목은 크게, 긴 제목은 작게
    const fontSize = titleLen <= 5 ? 16 : titleLen <= 8 ? 14 : titleLen <= 12 ? 12 : 11;
    // 글자당 차지하는 vertical 공간 (각 문자가 차지하는 height)
    const perChar = fontSize + 4;
    // 상하 가죽 밴드(22px*2) + count + genre(약 20px*2) + 패딩 = 약 100px
    const reserved = 110;
    const minH = 200;
    const height = Math.max(minH, reserved + titleLen * perChar);
    // 책 두께(폭) — 인용 카드 개수에 비례
    const width = 44 + Math.min(20, w.quotes.length * 3);
    return { height, width, fontSize };
  }

  const shelvesEl = document.getElementById('bookshelves');

  function renderShelves() {
    shelvesEl.innerHTML = '';
    for (const g of GENRE_ORDER) {
      const items = works.filter(w => w.genre === g);
      if (items.length === 0) continue;
      const section = document.createElement('section');
      section.className = 'genre-section';
      section.innerHTML = `
        <div class="genre-header">
          <span class="genre-name">${GENRE_LABEL[g]}</span>
          <span class="genre-count">${items.length} ${items.length===1?'BOOK':'BOOKS'}</span>
        </div>
        <div class="bookshelf g-${g}">
          <div class="shelf-row">
            ${items.map(w => {
              const d = bookDims(w);
              return `
                <button class="spine" type="button" data-key="${w.key}"
                  style="height:${d.height}px;width:${d.width}px;background-color:${w.color};">
                  <div class="spine-inner">
                    <span class="spine-count">${w.quotes.length}</span>
                    <span class="spine-title" style="font-size:${d.fontSize}px;">${w.title}</span>
                    <span class="spine-genre">${w.genreLabel}</span>
                  </div>
                </button>
              `;
            }).join('')}
          </div>
        </div>
      `;
      shelvesEl.appendChild(section);
    }
    shelvesEl.querySelectorAll('.spine').forEach(s => {
      s.addEventListener('click', () => openBook(s.dataset.key));
    });
  }

  // Book modal
  const modal = document.getElementById('book-modal');
  const bEyebrow = document.getElementById('b-eyebrow');
  const bTitle = document.getElementById('b-title');
  const bMeta = document.getElementById('b-meta');
  const bList = document.getElementById('b-list');
  document.getElementById('b-close').addEventListener('click', closeBook);
  modal.addEventListener('click', e => { if (e.target === modal) closeBook(); });

  function openBook(key) {
    const w = works.find(x => x.key === key);
    if (!w) return;
    const idx = works.findIndex(x => x.key === key) + 1;
    bEyebrow.textContent = `Collected · Volume #${String(idx).padStart(2,'0')}`;
    bTitle.textContent = w.title;
    bMeta.textContent = `${w.genreLabel.toUpperCase()} · ${w.author} · ${w.year}`;
    bList.innerHTML = w.quotes.map(it => `
      <div class="book-quote-item">
        <p class="book-quote-text">"${it.q}"</p>
        <p class="book-quote-meta">${it.d}</p>
      </div>
    `).join('');
    modal.classList.add('open');
  }
  function closeBook() { modal.classList.remove('open'); }

  renderShelves();
</script>
</body>
</html>
