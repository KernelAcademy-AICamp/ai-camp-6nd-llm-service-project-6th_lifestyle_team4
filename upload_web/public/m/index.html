<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport" />
<title>Daily Script — 오늘의 명대사</title>
<link rel="manifest" href="/manifest.webmanifest" />
<meta name="theme-color" content="#3525cd" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Daily Script" />
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
<link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Serif+KR:wght@400;500;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          'paper': '#ffffff',
          'ink': '#1a1a1a',
          'accent': '#3525cd',
          'accent-soft': '#eeebff',
          'border-soft': '#e6e4ee',
          'muted': '#646272',
          'card-bg': '#fafaff',
          'love': '#e11d48',
        },
        fontFamily: {
          'sans': ['Inter', 'system-ui', 'sans-serif'],
          'serif': ['Noto Serif KR', 'serif'],
        },
      },
    },
  };
</script>
<style>
  body { font-family: 'Inter', 'Noto Serif KR', sans-serif; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
  .icon-filled { font-variation-settings: 'FILL' 1, 'wght' 500; }
  .quote-hero {
    font-family: 'Noto Serif KR', serif;
    font-size: 28px;
    font-weight: 500;
    line-height: 1.55;
    word-break: keep-all;
    text-wrap: balance;
  }
  @media (max-width: 380px) { .quote-hero { font-size: 24px; } }
  .nav-btn { transition: color 0.15s; color: #646272; }
  .nav-btn.active { color: #3525cd; }
  .nav-btn.active .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 500; }
  .card-row {
    background: white;
    border: 1px solid #e6e4ee;
    border-radius: 16px;
    padding: 16px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .card-row:active { transform: scale(0.98); }
  .bookmark-btn { transition: transform 0.15s; }
  .bookmark-btn:active { transform: scale(0.85); }
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 100; opacity: 0; transition: opacity 0.2s;
  }
  .modal-backdrop.open { opacity: 1; }
  .modal-sheet {
    background: white; width: 100%; max-width: 600px;
    border-radius: 24px 24px 0 0;
    max-height: 90vh; overflow-y: auto;
    transform: translateY(100%); transition: transform 0.25s ease-out;
  }
  .modal-backdrop.open .modal-sheet { transform: translateY(0); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid #e6e4ee; border-top-color: #3525cd;
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }
</style>
</head>
<body class="bg-paper text-ink min-h-screen pb-20">

<header class="sticky top-0 z-40 bg-paper/95 backdrop-blur border-b border-border-soft">
  <div class="max-w-screen-md mx-auto px-4 py-3 flex items-center justify-between">
    <div>
      <h1 id="page-title" class="text-lg font-extrabold tracking-tight">오늘의 명대사</h1>
      <p id="page-sub" class="text-xs text-muted mt-0.5"></p>
    </div>
    <button data-install-app data-install-always class="hidden items-center gap-1 px-3 py-1.5 rounded-full border border-accent text-accent text-xs font-semibold">
      <span class="material-symbols-outlined" style="font-size:16px;">install_mobile</span>
      설치
    </button>
  </div>
</header>

<main class="max-w-screen-md mx-auto px-4 pt-6">

  <!-- ===== Home view ===== -->
  <section id="view-home">
    <div id="home-loading" class="flex flex-col items-center justify-center py-20">
      <div class="spinner"></div>
      <p class="text-sm text-muted mt-4">오늘의 카드를 불러오는 중…</p>
    </div>

    <article id="home-card" class="hidden bg-card-bg border border-border-soft rounded-3xl p-7 shadow-sm">
      <div class="flex items-center justify-between mb-4">
        <span class="text-xs font-semibold text-muted uppercase tracking-wider">Today</span>
        <button id="home-bookmark" class="bookmark-btn p-2 -m-2" aria-label="북마크">
          <span class="material-symbols-outlined text-2xl text-muted">bookmark</span>
        </button>
      </div>
      <p id="home-quote" class="quote-hero"></p>
      <div id="home-work" class="mt-6 text-sm text-muted flex flex-wrap items-center gap-x-2"></div>
      <button id="home-detail-btn"
              class="mt-6 w-full bg-ink text-paper py-3 rounded-xl text-sm font-semibold flex items-center justify-center gap-1">
        자세히 보기
        <span class="material-symbols-outlined" style="font-size:18px;">arrow_forward</span>
      </button>
    </article>

    <button id="home-shuffle" class="mt-4 w-full bg-white border border-border-soft py-3 rounded-xl text-sm font-semibold text-muted flex items-center justify-center gap-1 hidden">
      <span class="material-symbols-outlined" style="font-size:18px;">shuffle</span>
      다른 카드 보기
    </button>

    <div id="home-empty" class="hidden text-center py-16">
      <p class="text-sm text-muted">아직 카드가 없습니다.</p>
    </div>
  </section>

  <!-- ===== Cards view ===== -->
  <section id="view-cards" class="hidden">
    <div class="mb-3">
      <input id="cards-search" type="search" placeholder="작품·인용 검색…"
             class="w-full px-4 py-2.5 rounded-xl border border-border-soft text-sm focus:outline-none focus:border-accent" />
    </div>
    <div id="cards-status" class="text-xs text-muted mb-2"></div>
    <div id="cards-list" class="flex flex-col gap-3"></div>
  </section>

  <!-- ===== Bookmarks view ===== -->
  <section id="view-bookmarks" class="hidden">
    <div id="bookmarks-status" class="text-xs text-muted mb-3"></div>
    <div id="bookmarks-list" class="flex flex-col gap-3"></div>
    <div id="bookmarks-empty" class="hidden text-center py-16">
      <span class="material-symbols-outlined text-5xl text-border-soft">bookmark_border</span>
      <p class="text-sm text-muted mt-3">아직 담은 카드가 없어요</p>
      <p class="text-xs text-muted mt-1">카드 우상단의 북마크 아이콘으로 담아보세요.</p>
    </div>
  </section>

</main>

<!-- ===== Bottom nav ===== -->
<nav class="fixed bottom-0 left-0 right-0 bg-paper/95 backdrop-blur border-t border-border-soft z-40">
  <div class="max-w-screen-md mx-auto grid grid-cols-3">
    <button data-nav="home" class="nav-btn active flex flex-col items-center py-2.5 gap-0.5">
      <span class="material-symbols-outlined" style="font-size:24px;">today</span>
      <span class="text-[10px] font-semibold">오늘</span>
    </button>
    <button data-nav="cards" class="nav-btn flex flex-col items-center py-2.5 gap-0.5">
      <span class="material-symbols-outlined" style="font-size:24px;">collections_bookmark</span>
      <span class="text-[10px] font-semibold">카드</span>
    </button>
    <button data-nav="bookmarks" class="nav-btn flex flex-col items-center py-2.5 gap-0.5">
      <span class="material-symbols-outlined" style="font-size:24px;">bookmark</span>
      <span class="text-[10px] font-semibold">북마크</span>
    </button>
  </div>
</nav>

<!-- ===== Detail modal ===== -->
<div id="card-modal" class="modal-backdrop hidden">
  <div class="modal-sheet">
    <div class="sticky top-0 bg-white border-b border-border-soft px-5 py-3 flex items-center justify-between">
      <span class="text-sm font-semibold text-muted">카드 상세</span>
      <button id="modal-close" class="p-1 -m-1" aria-label="닫기">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div id="modal-body" class="p-6"></div>
  </div>
</div>

<!-- ===== Toast ===== -->
<div id="toast" class="fixed left-1/2 -translate-x-1/2 bottom-24 hidden px-4 py-2 bg-ink text-paper text-sm rounded-full shadow-lg z-50"></div>

<script type="module" src="/m/assets/m-app.js"></script>
<script type="module" src="/assets/pwa.js"></script>
</body>
</html>
